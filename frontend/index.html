<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>💡 Lumière Du Progrès</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    input, button, select { padding: 5px; margin: 5px; }
    .user { margin-bottom: 10px; }
    .balance { font-weight: bold; }
  </style>
</head>
<body>
  <h1>💡 Lumière Du Progrès</h1>

  <section id="create-user">
    <h2>Create User</h2>
    <input type="text" id="username" placeholder="Username">
    <button id="btn-create">Create User</button>
  </section>

  <section id="users-list">
    <h2>Users</h2>
    <div id="users"></div>
  </section>

  <section id="transactions">
    <h2>Deposit / Withdraw</h2>
    <select id="user-select"></select><br>
    <input type="number" id="amount" placeholder="Amount"><br>
    <button id="btn-deposit">Deposit</button>
    <button id="btn-withdraw">Withdraw</button>
  </section>

  <script src="app.js"></script>
</body>
</html>
